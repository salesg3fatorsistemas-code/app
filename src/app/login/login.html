<section class="login-comp">
    <div class="login-box">
        <span class="login-title">
            Zeno-X
        </span>

        <span class="login-slogan">
            Gestão Integrada para seu negócio!
        </span>

        <br><br>

        <img class="login-img" src="users.svg" alt="users">

        <div class="login-form">
            <form (ngSubmit)="userLogin()">
                <label for="NM_ENTIDADE">
                    Entidade:
                </label>

                <input
                type="text"
                name="NM_ENTIDADE"
                id="NM_ENTIDADE"
                [(ngModel)]="dataRow.NM_ENTIDADE"
                >

                <label for="CD_USUARIO">
                    Usuário:
                </label>
    
                <input
                type="text"
                name="CD_USUARIO"
                id="CD_USUARIO"
                [(ngModel)]="dataRow.CD_USUARIO"
                >
    
                <label for="HS_SENHA">
                    Senha:
                </label>
    
                <input
                type="password"
                name="HS_SENHA"
                id="HS_SENHA"
                [(ngModel)]="dataRow.HS_SENHA"
                >

                <select name="ID_ANO" id="ID_ANO">
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                </select>
    
                <button type="submit">
                    Entrar
                </button>
            </form>
        </div>
    </div>
</section>
