<section class="login-comp">
    <div class="login-box">
        <span class="login-title">
            Zeno-X
        </span>

        <span class="login-slogan">
            Gestão Integrada para seu negócio!
        </span>

        <br><br>

        <img class="login-img" src="users.svg" alt="users">

        <div class="login-form">
            <form action="">
                <label for="NM_ENTIDADE">
                    Entidade:
                </label>

                <input
                type="text"
                name="NM_ENTIDADE"
                id="NM_ENTIDADE"
                >

                <label for="CD_USUARIO">
                    Usuário:
                </label>
    
                <input
                type="text"
                name="CD_USUARIO"
                id="CD_USUARIO"
                >
    
                <label for="HS_SENHA">
                    Senha:
                </label>
    
                <input
                type="password"
                name="HS_SENHA"
                id="HS_SENHA"
                >
    
                <button type="submit">
                    Entrar
                </button>
            </form>
        </div>
    </div>
</section>
